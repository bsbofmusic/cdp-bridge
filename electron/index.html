<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDP Bridge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>CDP Bridge</h1>
          <p>本地浏览器通过 Tailscale 暴露给远端 OpenClaw。</p>
        </div>
        <div class="header-toggles">
          <label class="toggle">
            <input type="checkbox" data-setting="launchOnLogin" title="Start CDP Bridge automatically when you sign into Windows." />
            <span>Launch on login</span>
          </label>
          <label class="toggle">
            <input type="checkbox" data-setting="minimizeToTray" title="Hide the app to the system tray when you minimize or close the window." />
            <span>Minimize to tray</span>
          </label>
        </div>
      </header>
      <section id="feedback" class="feedback">正在连接本地桥接服务…</section>
      <section id="status"></section>
      <section id="actions" class="button-grid"></section>
      <section id="diagnostics" class="diagnostics"></section>
    </main>
    <script src="./renderer.js"></script>
  </body>
  </html>
